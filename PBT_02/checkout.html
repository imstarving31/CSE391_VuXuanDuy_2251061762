<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        input, select, textarea {
            display: block;
            margin-bottom: 10px;
        }
        input[type="radio"], input[type="checkbox"] {
            display: inline-block; 
        }
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
            text-align: left;
        }
        table {
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Thanh toán đơn hàng</h1>

    <label>Điểm tích lũy thành viên:</label><br>
    <meter value="360" min="0" max="1000" low="300" high="800" optimum="900"></meter> 360/1000 điểm
    <br><br>

    <label for="search">Tìm thêm sản phẩm:</label>
    <input list="products" id="search" name="search" placeholder="Nhập tên sản phẩm...">
    <datalist id="products">
        <option value="Tai nghe AirPods 4">
        <option value="Cáp sạc Type-C">
        <option value="Pin dự phòng 10000mAh">
        <option value="Kính cường lực">
    </datalist>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>iPhone 16 Pro Max</td>
                <td>25.000.000đ</td>
                <td>1</td>
                <td>25.000.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ốp lưng Titan</td>
                <td>500.000đ</td>
                <td>2</td>
                <td>1.000.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Củ sạc nhanh 20W</td>
                <td>500.000đ</td>
                <td>1</td>
                <td>500.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" style="text-align: right; font-weight: bold;">Tổng cộng:</td>
                <td><output>26.500.000đ</output></td>
            </tr>
        </tfoot>
    </table>

    <form action="#" method="POST">
        <fieldset>
            <legend>Phương thức thanh toán</legend>
            
            <input type="radio" id="cod" name="payment_method" value="cod" required>
            <label for="cod">Thanh toán khi nhận hàng (COD)</label><br>
            
            <input type="radio" id="bank" name="payment_method" value="bank">
            <label for="bank">Chuyển khoản ngân hàng</label><br>
            
            <input type="radio" id="ewallet" name="payment_method" value="ewallet">
            <label for="ewallet">Ví điện tử (Momo, ZaloPay)</label><br><br>

            <label for="discount">Mã giảm giá:</label>
            <input type="text" id="discount" name="discount" pattern="SALE[0-9]{4}" title="Định dạng: SALE + 4 chữ số (Ví dụ: SALE2026)" placeholder="Ví dụ: SALE2026">

            <label for="notes">Ghi chú đơn hàng:</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Ghi chú thêm về đơn hàng..."></textarea>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="delivery_date">Ngày giao hàng mong muốn:</label>
            <input type="date" id="delivery_date" name="delivery_date" min="2026-05-05" required>

            <label for="time_slot">Khung giờ giao hàng:</label>
            <select id="time_slot" name="time_slot" required>
                <option value="">-- Chọn khung giờ --</option>
                <option value="morning">Sáng 8-12h</option>
                <option value="afternoon">Chiều 14-18h</option>
                <option value="evening">Tối 18-21h</option>
            </select>

            <label for="duration">Thời gian giao hàng tối đa (số ngày):</label>
            <input type="range" id="duration" name="duration" min="1" max="7" step="1">
        </fieldset>

        <button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>
    </form>
</body>
</html>
