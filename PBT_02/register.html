<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        input, select, textarea {
            display: block;
            margin-bottom: 10px;
        }
        input[type="radio"], input[type="checkbox"] {
            display: inline-block; 
        }
    </style>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="hoten">Họ tên:</label>
            <input type="text" id="hoten" name="hoten" required minlength="2" maxlength="50" placeholder="Nhập họ và tên">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Nhập địa chỉ email">

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="0[0-9]{9}" title="Nhập đủ 10 số, bắt đầu bằng số 0!" placeholder="Nhập số điện thoại">

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-05-04">
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_]{3,20}" title="Từ 3-20 ký tự, gồm chữ cái, số hoặc dấu gạch dưới" placeholder="Nhập username">

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" required minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).*" title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 số" placeholder="Nhập mật khẩu">

            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8" placeholder="Nhập lại mật khẩu">
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn thành phố --</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
                <option value="haiphong">Hải Phòng</option>
                <option value="cantho">Cần Thơ</option>
            </select>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district" required>
                <option value="">-- Chọn quận/huyện --</option>
                <option value="q1">Quận 1</option>
                <option value="q3">Quận 3</option>
                <option value="caugiay">Cầu Giấy</option>
            </select>

            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, đường..."></textarea>

            <label>Giới tính:</label><br>
            <input type="radio" id="gender_nam" name="gender" value="nam">
            <label for="gender_nam">Nam</label>
            
            <input type="radio" id="gender_nu" name="gender" value="nu">
            <label for="gender_nu">Nữ</label>
            
            <input type="radio" id="gender_khac" name="gender" value="khac">
            <label for="gender_khac">Khác</label>
        </fieldset>

        <fieldset>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với các điều khoản</label>
            <br><br>

            <button type="submit">Đăng ký</button>
            <button type="reset">Làm mới</button>
        </fieldset>

    </form>
</body>
</html>
