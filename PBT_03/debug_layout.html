<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug CSS Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
    <h2>Cách 1: Sửa bằng border-box</h2>
    <div class="container">
        <div class="sidebar fix-1">Sidebar (Cách 1)</div>
        <div class="content fix-1">Content (Cách 1)</div>
        <div class="clear"></div>
    </div>

    <h2>Cách 2: Sửa bằng cách trừ toán học (Không dùng border-box)</h2>
    <div class="container">
        <div class="sidebar fix-2-sidebar">Sidebar (Cách 2)</div>
        <div class="content fix-2-content">Content (Cách 2)</div>
        <div class="clear"></div>
    </div>
</body>
</html>
